<body>
<div class="app-wrapper" id="app"></div>

<script>
// ═══════════════════════════════════════════════════════════════════════════════
// SCI SIMULATEUR FISCAL — IR vs IS (Législation française 2025)
// ═══════════════════════════════════════════════════════════════════════════════

const IR_BRACKETS = [
  { min: 0, max: 11294, rate: 0 },
  { min: 11294, max: 28797, rate: 0.11 },
  { min: 28797, max: 82341, rate: 0.30 },
  { min: 82341, max: 177106, rate: 0.41 },
  { min: 177106, max: Infinity, rate: 0.45 },
];
const IS_RATE_REDUCED = 0.15, IS_RATE_NORMAL = 0.25, IS_REDUCED_LIMIT = 42500;
const FLAT_TAX = 0.30, PS_RATE = 0.172, CSG_DED = 0.068;
const AMORT_IMMEUBLE = 0.02, AMORT_MOBILIER = 0.10;

const PV_ABATT_IR = [
  { from: 0, to: 5, rate: 0 }, { from: 6, to: 21, rate: 0.06 },
  { from: 22, to: 22, rate: 0.04 }, { from: 23, to: Infinity, rate: 0 },
];
const PV_ABATT_PS = [
  { from: 0, to: 5, rate: 0 }, { from: 6, to: 21, rate: 0.0165 },
  { from: 22, to: 22, rate: 0.018 }, { from: 23, to: 30, rate: 0.09 },
  { from: 31, to: Infinity, rate: 0 },
];

const fmt = n => new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(n);
const fmtPct = n => new Intl.NumberFormat('fr-FR',{style:'percent',maximumFractionDigits:1}).format(n);

function computeIR(rev, parts) {
  const q = rev / parts; let imp = 0;
  for (const b of IR_BRACKETS) { if (q <= b.min) break; imp += (Math.min(q, b.max) - b.min) * b.rate; }
  return imp * parts;
}
function computeIS(ben) {
  if (ben <= 0) return 0;
  if (ben <= IS_REDUCED_LIMIT) return ben * IS_RATE_REDUCED;
  return IS_REDUCED_LIMIT * IS_RATE_REDUCED + (ben - IS_REDUCED_LIMIT) * IS_RATE_NORMAL;
}
function computePVAbatt(dur, table) {
  let t = 0; for (let y = 1; y <= dur; y++) for (const b of table) if (y >= b.from && y <= b.to) { t += b.rate; break; }
  return Math.min(t, 1);
}

// ─── State ────────────────────────────────────────────────────────────────────
const state = {
  prixAcquisition: 300000, fraisNotaire: 24000, travaux: 30000,
  partImmeuble: 80, valeurMobilier: 10000,
  loyerMensuel: 1500, chargesAnnuelles: 3000, taxeFonciere: 2500,
  interetsEmprunt: 8000, assuranceEmprunt: 1200, fraisGestion: 0,
  revenuFoyerAutre: 60000, parts: 2, regimeIR: 'reel',
  dureeDetention: 15, prixRevente: 400000,
  nbEnfants: 2, ageAssocies: 55, demembrement: false, capitalRestantDu: 100000,
  activeTab: 'exploitation',
};

function update(key, val) { state[key] = val; render(); }

// ─── Calculations ─────────────────────────────────────────────────────────────
function calc() {
  const s = state;
  const loyerAn = s.loyerMensuel * 12;
  const chargesTotal = s.chargesAnnuelles + s.taxeFonciere + s.interetsEmprunt + s.assuranceEmprunt + s.fraisGestion;

  // === IR ===
  let revNet;
  if (s.regimeIR === 'micro') revNet = loyerAn * 0.70;
  else revNet = loyerAn - chargesTotal;
  const defFoncier = revNet < 0 ? Math.max(revNet, -10700) : 0;
  const revFoncImposable = Math.max(revNet, 0);
  const revTotalSans = s.revenuFoyerAutre;
  const revTotalAvec = s.revenuFoyerAutre + revFoncImposable + (defFoncier < 0 ? defFoncier : 0);
  const irSans = computeIR(Math.max(revTotalSans,0), s.parts);
  const irAvec = computeIR(Math.max(revTotalAvec,0), s.parts);
  const irSurImmo = irAvec - irSans;
  const psImmo = Math.max(revFoncImposable,0) * PS_RATE;
  const fiscIR = irSurImmo + psImmo;
  const revNetApresImpot = loyerAn - (s.regimeIR==='micro'?0:chargesTotal) - fiscIR;
  const quotient = Math.max(revTotalAvec,0)/s.parts;
  let tmiRate = 0; for (const b of IR_BRACKETS) if (quotient > b.min) tmiRate = b.rate;

  // PV IR
  const pvBruteIR = s.prixRevente - (s.prixAcquisition + s.fraisNotaire + s.travaux);
  const abIR = computePVAbatt(s.dureeDetention, PV_ABATT_IR);
  const abPS = computePVAbatt(s.dureeDetention, PV_ABATT_PS);
  const pvNetIR = Math.max(pvBruteIR*(1-abIR),0);
  const pvNetPS = Math.max(pvBruteIR*(1-abPS),0);
  const impPV_IR = pvNetIR*0.19 + pvNetPS*PS_RATE;
  const surtaxe = pvNetIR>50000?pvNetIR*0.06:0;
  const pvTotTaxIR = impPV_IR + surtaxe;
  const pvNetteIR = Math.max(pvBruteIR,0) - pvTotTaxIR;
  const exoIR22 = s.dureeDetention >= 22;
  const exoPS30 = s.dureeDetention >= 30;

  // === IS ===
  const baseImm = (s.prixAcquisition+s.fraisNotaire)*(s.partImmeuble/100);
  const amortImm = baseImm * AMORT_IMMEUBLE;
  const amortMob = s.valeurMobilier * AMORT_MOBILIER;
  const amortTrav = s.travaux / 10;
  const totalAmort = amortImm + amortMob + amortTrav;
  const resComptable = loyerAn - chargesTotal - totalAmort;
  const isAmount = computeIS(Math.max(resComptable,0));
  const resNet = resComptable - isAmount;
  const divBruts = Math.max(resNet,0);
  const flatTaxDiv = divBruts * FLAT_TAX;
  const divNetsPFU = divBruts - flatTaxDiv;
  const abatt40 = divBruts * 0.40;
  const divImposBareme = divBruts - abatt40;
  const csgDed = divBruts * CSG_DED;
  const revTotBareme = s.revenuFoyerAutre + divImposBareme - csgDed;
  const irBareme = computeIR(Math.max(revTotBareme,0), s.parts);
  const irSansDiv = computeIR(s.revenuFoyerAutre, s.parts);
  const irSurDiv = irBareme - irSansDiv;
  const psSurDiv = divBruts * PS_RATE;
  const totalBareme = irSurDiv + psSurDiv;
  const divNetsBareme = divBruts - totalBareme;
  const meilleurOpt = totalBareme < flatTaxDiv ? 'barème' : 'PFU';
  const meilleurMontant = meilleurOpt==='barème'?totalBareme:flatTaxDiv;
  const meilleurDivNets = divBruts - meilleurMontant;

  // PV IS
  const totAmortCumul = totalAmort * s.dureeDetention;
  const vnc = Math.max(s.prixAcquisition+s.fraisNotaire+s.travaux+s.valeurMobilier-totAmortCumul, 0);
  const pvBruteIS = s.prixRevente - vnc;
  const isPV = computeIS(Math.max(pvBruteIS,0));
  const pvApresIS = Math.max(pvBruteIS,0) - isPV;
  const flatTaxPV = pvApresIS * FLAT_TAX;
  const pvNetteAssocies = pvApresIS - flatTaxPV;

  // === TRANSMISSION ===
  const actifNet = s.prixAcquisition + s.travaux + s.valeurMobilier - s.capitalRestantDu;
  const valParts = Math.max(actifNet,0);
  let coeffNP = 1;
  if (s.demembrement) {
    const a = s.ageAssocies;
    if (a<21) coeffNP=0.10; else if(a<31) coeffNP=0.20; else if(a<41) coeffNP=0.30;
    else if(a<51) coeffNP=0.40; else if(a<61) coeffNP=0.50; else if(a<71) coeffNP=0.60;
    else if(a<81) coeffNP=0.70; else if(a<91) coeffNP=0.80; else coeffNP=0.90;
  }
  const valTransIR = valParts * coeffNP;
  const valTransIS = valParts * coeffNP;

  const calcDroits = (valTot) => {
    const parEnf = valTot / Math.max(s.nbEnfants,1);
    const apresAb = Math.max(parEnf - 100000, 0);
    let d = 0, prev = 0;
    const tr = [{max:8072,r:0.05},{max:12109,r:0.10},{max:15932,r:0.15},{max:552324,r:0.20},{max:902838,r:0.30},{max:1805677,r:0.40},{max:Infinity,r:0.45}];
    for (const t of tr) { if(apresAb<=prev) break; d+=(Math.min(apresAb,t.max)-prev)*t.r; prev=t.max; }
    return d * s.nbEnfants;
  };
  const droitsIR = calcDroits(valTransIR);
  const droitsIS = calcDroits(valTransIS);

  // === BILAN ===
  const totFiscIR_exp = fiscIR * s.dureeDetention;
  const totFiscIS_exp = (isAmount + meilleurMontant) * s.dureeDetention;
  const totalIR = totFiscIR_exp + pvTotTaxIR + droitsIR;
  const totalIS = totFiscIS_exp + isPV + flatTaxPV + droitsIS;
  const ecart = totalIR - totalIS;
  const reco = ecart > 0 ? 'IS' : 'IR';

  return {
    loyerAn, chargesTotal, revNet, defFoncier, revFoncImposable, irSurImmo, psImmo, fiscIR, revNetApresImpot, tmiRate,
    pvBruteIR, abIR, abPS, pvNetIR, pvNetPS, pvTotTaxIR, surtaxe, pvNetteIR, exoIR22, exoPS30,
    amortImm, amortMob, amortTrav, totalAmort, resComptable, isAmount, resNet,
    divBruts, flatTaxDiv, divNetsPFU, totalBareme, divNetsBareme, meilleurOpt, meilleurMontant, meilleurDivNets,
    totAmortCumul, vnc, pvBruteIS, isPV, pvApresIS, flatTaxPV, pvNetteAssocies,
    valParts, coeffNP, valTransIR, valTransIS, droitsIR, droitsIS,
    totFiscIR_exp, totFiscIS_exp, totalIR, totalIS, ecart, reco,
  };
}

// ─── Render Helpers ───────────────────────────────────────────────────────────
function field(id, label, suffix='€', tooltip='', step=1000, min=0) {
  return `<div class="field">
    <label class="field-label">${label}${tooltip?` <span class="field-hint" title="${tooltip}">?</span>`:''}</label>
    <div class="input-wrap">
      <input type="number" value="${state[id]}" min="${min}" step="${step}" onchange="update('${id}',Number(this.value))">
      ${suffix?`<span class="input-suffix">${suffix}</span>`:''}
    </div>
  </div>`;
}

function selectField(id, label, options, tooltip='') {
  const opts = options.map(o=>`<option value="${o.v}"${state[id]==o.v?' selected':''}>${o.l}</option>`).join('');
  return `<div class="field">
    <label class="field-label">${label}${tooltip?` <span class="field-hint" title="${tooltip}">?</span>`:''}</label>
    <select onchange="update('${id}',this.value==='true'?true:this.value==='false'?false:isNaN(this.value)?this.value:Number(this.value))">${opts}</select>
  </div>`;
}

function dtRow(label, value, opts={}) {
  const cls = [opts.hl?`hl-${opts.hl}`:''].filter(Boolean).join(' ');
  const lcls = opts.bold ? 'dt-label bold' : 'dt-label';
  const vcls = opts.bold ? 'dt-value bold' : 'dt-value';
  const indent = opts.indent ? '<span class="indent">↳</span>' : '';
  const color = opts.color ? `color:${opts.color}` : '';
  return `<div class="dt-row ${cls}"><span class="${lcls}">${indent}${label}</span><span class="${vcls}" style="${color}">${value}</span></div>`;
}

function resultCard(icon, title, value, sub, color) {
  return `<div class="result-card"><div class="rc-header"><span style="font-size:16px">${icon}</span><span class="rc-label">${title}</span></div><div class="rc-value" style="color:${color}">${value}</div>${sub?`<div class="rc-sub">${sub}</div>`:''}</div>`;
}

function compBar(lL,lR,vL,vR,cL,cR) {
  const t = Math.abs(vL)+Math.abs(vR); const p = t>0?(Math.abs(vL)/t*100):50;
  return `<div class="comp-bar"><div class="comp-bar-labels"><span>${lL}: <b style="color:${cL}">${fmt(vL)}</b></span><span>${lR}: <b style="color:${cR}">${fmt(vR)}</b></span></div><div class="comp-bar-track"><div style="width:${p}%;background:${cL}"></div><div style="width:${100-p}%;background:${cR}"></div></div></div>`;
}
